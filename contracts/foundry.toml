[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin-contracts-upgradeable/=src/flap/oz-shims/",
]

[rpc_endpoints]
robinhood = "https://rpc.mainnet.chain.robinhood.com"
