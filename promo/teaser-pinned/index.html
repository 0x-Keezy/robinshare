<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[{"id":"bookends","type":"boolean","label":"Bookends (corte B: fotos 3D en beats 1 y 5)","default":true}]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>RobinShare — teaser pinned (5 beats)</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ---------- fonts (local, deterministic — no CDN) ---------- */
      @font-face {
        font-family: "Archivo Black";
        src: url("fonts/archivo-black-400-latin.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }
      /* supplementary subset — only the → glyph (U+2192) rides on Archivo Black,
         so the arrow in beat 4's third line ("...fee → builder.") renders in the
         display face instead of falling back to a system font. */
      @font-face {
        font-family: "Archivo Black";
        src: url("fonts/archivo-black-400-arrow.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        unicode-range: U+2192;
        font-display: block;
      }
      @font-face {
        font-family: "IBM Plex Mono";
        src: url("fonts/ibm-plex-mono-400-latin.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }
      @font-face {
        font-family: "IBM Plex Mono";
        src: url("fonts/ibm-plex-mono-500-latin.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
        font-display: block;
      }

      /* ---------- reset + palette ---------- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --paper: #0d120e;
        --ink: #f2f3ee;
        --lime: #ccff00;
        --signal: #00c805;
        --dim: rgba(242, 243, 238, 0.62);
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        background: var(--paper);
        overflow: hidden;
      }
      body {
        font-family: "IBM Plex Mono", monospace;
        color: var(--ink);
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--paper);
      }

      .clip {
        position: absolute;
      }
      .scene-fill {
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: var(--paper);
      }

      /* bookend photo layer — shown by default (declared variable default is
         true); JS removes `.is-bookends` from <html> when the variable resolves
         false, which is the only thing that hides these. No JS run = still
         correct, since the CSS default matches the variable default. */
      html {
        /* default-on: matches data-composition-variables default `true` */
      }
      .bookend-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        transform-origin: 50% 50%;
        will-change: transform;
        display: block;
      }
      .bookend-scrim {
        position: absolute;
        inset: 0;
        display: block;
      }
      html.no-bookends .bookend-bg,
      html.no-bookends .bookend-scrim {
        display: none;
      }

      /* ---------- typography ---------- */
      .display {
        font-family: "Archivo Black", sans-serif;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        color: var(--ink);
      }
      .mono {
        font-family: "IBM Plex Mono", monospace;
        color: var(--dim);
      }
      .mono-url {
        text-transform: none;
      }

      /* ---------- beat 1 : hook ---------- */
      #beat1 {
        display: flex;
        align-items: center;
      }
      .b1-scrim {
        background: linear-gradient(
          100deg,
          rgba(13, 18, 14, 0.62) 0%,
          rgba(13, 18, 14, 0.34) 55%,
          rgba(13, 18, 14, 0.52) 100%
        );
      }
      .b1-content {
        position: relative;
        z-index: 2;
        padding: 0 150px;
        width: 100%;
      }
      #beat1-text {
        display: flex;
        flex-wrap: wrap;
        column-gap: 0.28em;
        row-gap: 0.06em;
        max-width: 1560px;
        font-size: 118px;
        line-height: 1.04;
      }
      .b1-word {
        display: inline-block;
        will-change: transform, opacity;
      }

      /* ---------- beat 2 : twist ---------- */
      #beat2 {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #beat2-text {
        text-align: center;
        max-width: 1680px;
        font-size: 112px;
        line-height: 1.06;
        color: var(--lime);
        will-change: transform;
      }

      /* ---------- beat 3 : product — movimiento real (widget en vivo +
         push de camara + scroll cinematografico) ---------- */
      #beat3-widget-video,
      #beat3-scroll-video {
        inset: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
        will-change: transform;
      }
      /* Matte de papel al pie: ancla el rótulo mono y da aire al corte con
         beat 4, sobre ambos videos (ninguno trae ya marquesina que ocultar,
         a diferencia del tape-hero viejo — esto es una viñeta suave). */
      #beat3-foot-matte {
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: linear-gradient(
          180deg,
          rgba(13, 18, 14, 0) 78%,
          rgba(13, 18, 14, 0.6) 90%,
          rgb(13, 18, 14) 100%
        );
      }
      /* Bezel de ventana de navegador — plano, sin recorte de video (el
         <video> no se puede envolver): una franja opaca al tope, 3
         traffic-lights + URL mono. Persiste 7.0-23.6s, hermana del video y
         el cursor en el push de cámara (mismo scale/x/y). */
      #beat3-frame {
        top: 0;
        left: 0;
        width: 1920px;
        height: 56px;
        background: var(--paper);
        border-bottom: 1px solid rgba(242, 243, 238, 0.1);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 28px;
        will-change: transform;
      }
      .b3-dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        display: inline-block;
      }
      /* Traffic-lights de marca (FIX gate de arte) — nada de rojo/amarillo
         estilo macOS: los dos primeros en tonos apagados de gris-verde
         (distintos entre sí para que se lean como 3 puntos, no un blob), el
         tercero ("activo") en verde señal de marca. */
      .b3-dot-red {
        background: #3a4740;
      }
      .b3-dot-yellow {
        background: #55665c;
      }
      .b3-dot-green {
        background: var(--signal);
      }
      .b3-url {
        margin-left: 18px;
        font-size: 15px;
        letter-spacing: 0.04em;
      }
      #beat3-label {
        left: 96px;
        bottom: 84px;
        max-width: 1400px;
        font-size: 26px;
        letter-spacing: 0.14em;
        line-height: 1.5;
        will-change: transform, opacity;
      }
      /* Cursor de marca — triángulo SVG (vocabulario cursor-click-ripple),
         reposa sobre el input del widget (coords de beat3-coords.json).
         FIX gate de arte: relleno lima + halo estático (drop-shadow, sin
         animación) para que lea como gesto de dirección de arte, no como
         puntero de sistema. */
      #beat3-cursor {
        left: 1294px;
        top: 448px;
        width: 30px;
        height: 30px;
        pointer-events: none;
        will-change: transform, opacity;
        filter: drop-shadow(0 0 3px rgba(204, 255, 0, 0.85)) drop-shadow(0 0 11px rgba(204, 255, 0, 0.5));
      }
      #beat3-ripple {
        left: 1255px;
        top: 407px;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 2px solid var(--lime);
        transform: scale(0);
        opacity: 0;
        pointer-events: none;
      }
      /* Foco durante el push/hold (9.6-15.58s): scrim radial que hunde los
         fragmentos huérfanos del hero (titular cortado a la izquierda, botón
         asomando arriba) como atmósfera intencional — spotlight en el panel
         del widget, que llega centrado al canvas (960,540) apenas termina el
         push (11.0s) y se mantiene ahí durante todo el hold Y el pull-back
         del bezel (15.18-15.58) — el video sigue al scale del push hasta el
         corte duro, así que la sombra no puede retirarse antes. Elipse
         calibrada al footprint real del panel ya escalado 1.7x (medio-ancho
         356px, medio-alto 320px desde beat3-coords.json): el centro
         transparente cubre el panel entero con margen, oscurece recién fuera
         de ese radio. */
      #beat3-focus-vignette {
        inset: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
      }
      /* La animación vive en un div interno (no-clip): sin esto, un tween que
         terminara justo en el límite de la ventana del propio clip
         necesitaría un hard-kill explícito en vez de confiar en el propio
         toggle de visibilidad del framework — el wrapper evita el caso por
         completo (el foco no hace fade-out propio: desaparece con el corte
         duro de la escena en 15.58, ver el tween en el <script>). */
      #beat3-focus-vignette-inner {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: radial-gradient(
          ellipse 640px 560px at 960px 540px,
          rgba(3, 6, 4, 0) 0%,
          rgba(3, 6, 4, 0) 58%,
          rgba(3, 6, 4, 0.9) 82%,
          rgba(3, 6, 4, 0.9) 100%
        );
        opacity: 0;
        pointer-events: none;
        will-change: opacity;
      }

      /* ---------- beat 4 : promise ---------- */
      #beat4 {
        display: flex;
        align-items: center;
      }
      .b4-stack {
        padding: 0 130px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .b4-line {
        font-size: 78px;
        line-height: 1.08;
        will-change: transform, opacity, filter;
      }
      .b4-line.lime {
        color: var(--lime);
      }

      /* ---------- beat 5 : sting ---------- */
      #beat5 {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .b5-scrim {
        background: rgba(13, 18, 14, 0.4);
      }
      #beat5-bg {
        /* grade one step darker/cooler so the closing shot reads as the same
           studio as beat 1's bookend-open (art-review requirement #1); a small
           saturation/contrast bump keeps the lime fletching from going muddy
           under the darken (art-review requirement #3, understated). */
        filter: brightness(0.68) saturate(1.08) contrast(1.05);
      }
      #beat5-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        text-align: center;
      }
      #bowmark {
        width: 104px;
        height: 104px;
        will-change: transform, opacity;
      }
      #beat5-word {
        font-size: 78px;
        line-height: 1;
        will-change: transform, opacity;
      }
      #beat5-tag {
        font-size: 30px;
        font-weight: 500;
        letter-spacing: 0.06em;
        will-change: transform, opacity;
      }
      #beat5-url {
        font-size: 22px;
        letter-spacing: 0.02em;
        will-change: opacity;
      }
      #beat5-veil {
        position: absolute;
        inset: 0;
        z-index: 5;
        background: var(--paper);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="33"
      data-width="1920"
      data-height="1080"
    >
      <!-- ============ BEAT 1 — HOOK (0-4s) ============ -->
      <section id="beat1" class="clip scene-fill" data-start="0" data-duration="4" data-track-index="1">
        <div class="bookend-bg" id="beat1-bg" style="background-image: url('assets/bookend-open.png')"></div>
        <div class="bookend-scrim b1-scrim"></div>
        <div class="b1-content">
          <h1 id="beat1-text" class="display">
            <span class="b1-word">Robin</span>
            <span class="b1-word">Hood</span>
            <span class="b1-word">is</span>
            <span class="b1-word">about</span>
            <span class="b1-word">sharing.</span>
          </h1>
        </div>
      </section>

      <!-- ============ BEAT 2 — TWIST (4-7s) ============ -->
      <section id="beat2" class="clip scene-fill" data-start="4" data-duration="3" data-track-index="1">
        <h1 id="beat2-text" class="display">We built that on-chain.</h1>
      </section>

      <!-- ============ BEAT 3 — PRODUCT (7-24s) — movimiento real ============
           Sub-beats (ver .superpowers/sdd/web-f2-report.md):
           7.0-8.2 establish · 7.0-16.6 widget en vivo · 8.6-9.2 cursor→input ·
           9.2-9.6 click+ripple · 9.6-11.0 push de cámara al panel ·
           11.0-16.2 hold (el feed real hace el trabajo) · 16.1-16.6 cursor
           fade-out · 16.2-16.6 pull-back del marco · 16.6-23.6 scroll en vivo
           con push continuo suave · 23.6-24.0 settle. -->
      <video
        id="beat3-widget-video"
        class="clip"
        src="assets/beat3-widget.webm"
        data-start="7"
        data-duration="8.58"
        data-media-start="5.5"
        data-track-index="1"
        muted
        playsinline
      ></video>
      <video
        id="beat3-scroll-video"
        class="clip"
        src="assets/beat3-scroll.webm"
        data-start="15.58"
        data-duration="8.42"
        data-media-start="2.2"
        data-track-index="2"
        muted
        playsinline
      ></video>
      <div id="beat3-foot-matte" class="clip" data-start="7" data-duration="16.6" data-track-index="3"></div>
      <div
        id="beat3-frame"
        class="clip"
        data-start="7"
        data-duration="16.6"
        data-track-index="4"
        data-layout-allow-overflow="true"
      >
        <span class="b3-dot b3-dot-red"></span>
        <span class="b3-dot b3-dot-yellow"></span>
        <span class="b3-dot b3-dot-green"></span>
        <span class="b3-url mono mono-url">robinshare.vercel.app</span>
      </div>
      <div id="beat3-label" class="clip mono" data-start="7" data-duration="16.6" data-track-index="5">
        the real product <span class="mono-url">—</span> live at
        <span class="mono-url">robinshare.vercel.app</span>
      </div>
      <div id="beat3-ripple" class="clip" data-start="9.2" data-duration="0.6" data-track-index="7"></div>
      <div id="beat3-cursor" class="clip" data-start="8.6" data-duration="6.98" data-track-index="6">
        <svg width="30" height="30" viewBox="0 0 24 24">
          <path d="M5 3L19 12L12 13L9 20L5 3Z" fill="var(--lime)" stroke="var(--paper)" stroke-width="1.5" />
        </svg>
      </div>
      <div id="beat3-focus-vignette" class="clip" data-start="9.5" data-duration="6.08" data-track-index="8">
        <div id="beat3-focus-vignette-inner"></div>
      </div>

      <!-- ============ BEAT 4 — PROMISE (24-29s) ============ -->
      <section id="beat4" class="clip scene-fill" data-start="24" data-duration="5" data-track-index="1" data-layout-allow-overflow="true">
        <div class="b4-stack">
          <div class="b4-line display" id="b4-l1">Every trade pays the builder.</div>
          <div class="b4-line display" id="b4-l2">0 admin keys.</div>
          <div class="b4-line display lime" id="b4-l3">100% of the fee → builder.</div>
        </div>
      </section>

      <!-- ============ BEAT 5 — REMATE (29-33s) ============ -->
      <section id="beat5" class="clip scene-fill" data-start="29" data-duration="4" data-track-index="1">
        <div class="bookend-bg" id="beat5-bg" style="background-image: url('assets/bookend-close.png')"></div>
        <div class="bookend-scrim b5-scrim"></div>
        <div id="beat5-content">
          <svg id="bowmark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 3 A 13 13 0 0 1 7 21" stroke="var(--signal)" stroke-width="1.7" stroke-linecap="round" />
            <path d="M7 3 L7 21" stroke="var(--signal)" stroke-width="0.8" opacity="0.65" />
            <path d="M3 12 L21 12" stroke="var(--signal)" stroke-width="1.5" stroke-linecap="round" />
            <path d="M21 12 L16.8 9.9 M21 12 L16.8 14.1" stroke="var(--signal)" stroke-width="1.5" stroke-linecap="round" />
            <path d="M3 12 L5.4 9.9 M3 12 L5.4 14.1" stroke="var(--signal)" stroke-width="1" opacity="0.7" stroke-linecap="round" />
          </svg>
          <div id="beat5-word" class="display">ROBINSHARE</div>
          <div id="beat5-tag" class="mono">Soon on Robinhood Chain.</div>
          <div id="beat5-url" class="mono mono-url">robinshare.vercel.app</div>
        </div>
        <div id="beat5-veil"></div>
      </section>

      <!-- ============ COLCHÓN DE AMBIENTE — bed continuo (33s) ============
           Drone/pad generado localmente (MusicGen, facebook/musicgen-small vía media-use;
           el bundle de SFX no tiene ambient/drone/pad — ver informe). Corre a nivel PRESENTE
           y parejo (0.5 — antes 0.14, casi mudo en el arranque) para que la atmósfera se
           SIENTA en las ventanas quietas (hook 0-4s, widget establish, promesa) incluso en
           un parlante de celular, y así nunca haya silencio muerto entre golpes. Como es un
           pad constante, en las ventanas ruidosas los acentos lo enmascaran, así que este
           nivel no las satura. El archivo trae la envolvente bakeada: fade-in 0.8s (el hook
           levanta rápido sin click de arranque) y fade-out 27-29.3s → llega a SILENCIO justo
           antes de que dispare el impacto del lockup (29.3s), para NO sumarse al pico más
           fuerte del video (así el lockup no clippea aun con el bed más alto). Pista 9, por
           debajo de todos los SFX puntuales. -->
      <audio id="bed-ambient" src="assets/bed-ambient.mp3"
        data-start="0" data-duration="33" data-track-index="9" data-volume="0.5"></audio>

      <!-- ============ CAPA DE SONIDO — SFX diseñados (bundled, sin credenciales) ============
           Sin BGM continuo: una capa de sonido puntual que subraya los cortes secos del
           teaser brutalista. 6 archivos, 7 disparos, registro minimal/premium/tech. Cada
           <audio> es hijo directo del root (requisito HyperFrames), en pistas 10+ para no
           chocar con las reglas de solape de las visuales (1-5). data-duration = largo real
           del archivo → se reproduce entero una vez, con su decay. -->

      <!-- beat 2 · corte seco "We built that on-chain" (4s) → sub-boom que marca el twist -->
      <audio id="sfx-cut" src="assets/sfx-impact-cut.mp3"
        data-start="4" data-duration="2.116" data-track-index="10" data-volume="0.82"></audio>

      <!-- beat 3 · corte hero→scroll (15.58s — retimeado desde el 17.0 previsto:
           beat3-widget.webm solo tiene 8.58s reproducibles tras data-media-start
           5.5s, así que el hero cierra a los 15.58s, no a los 16.6s; ver informe)
           → whoosh suave, editorial -->
      <audio id="sfx-slide" src="assets/sfx-whoosh.mp3"
        data-start="15.58" data-duration="0.575" data-track-index="11" data-volume="0.34"></audio>

      <!-- puente · riser de ~10s que crestea en el logo del beat 5 (29.03s = 19.0 + 10.03);
           bajo (0.42) para levantar tensión sin volverse épica de trailer -->
      <audio id="sfx-riser" src="assets/sfx-riser.mp3"
        data-start="19" data-duration="10.032" data-track-index="12" data-volume="0.42"></audio>

      <!-- beat 4 · un hit corto en la entrada de cada una de las 3 líneas -->
      <audio id="sfx-l1" src="assets/sfx-whoosh.mp3"
        data-start="24" data-duration="0.575" data-track-index="13" data-volume="0.5"></audio>
      <audio id="sfx-l2" src="assets/sfx-whoosh-short.mp3"
        data-start="25.7" data-duration="0.575" data-track-index="14" data-volume="0.5"></audio>
      <!-- L3 es la línea lima "100% of the fee → builder": ping nítido, el dato clave -->
      <audio id="sfx-l3" src="assets/sfx-ping.mp3"
        data-start="27.3" data-duration="1.32" data-track-index="15" data-volume="0.56"></audio>

      <!-- beat 5 · impacto final en el lockup ROBINSHARE (29.3s), resuelve el riser -->
      <audio id="sfx-lockup" src="assets/sfx-impact-lockup.mp3"
        data-start="29.3" data-duration="2.592" data-track-index="16" data-volume="0.85"></audio>

      <!-- ============ SOUND DESIGN — capa nueva (widget + scroll) ============
           Llena los huecos que quedaban mudos entre los golpes existentes. Todo bundled
           (media-use, sin credenciales). El bundle solo tiene una textura "whoosh" real
           (whoosh.mp3 y whoosh-short.mp3 son el MISMO archivo — hash idéntico, ver informe),
           así que las variantes de whoosh de abajo comparten fuente pero se dosifican en
           volumen para no sonar a copia-pegada. -->

      <!-- widget · swish MUY leve en la entrada del cursor (8.6s, mismo instante que el
           tween de entrada del cursor) -->
      <audio id="sfx-cursor-swish" src="assets/sfx-whoosh-short.mp3"
        data-start="8.6" data-duration="0.575" data-track-index="17" data-volume="0.20"></audio>

      <!-- widget · 3 ticks de tecla discretos entre el click sobre el input (9.25s) y el
           arranque del push de cámara (9.6s) — flourish de "tipeo rápido" tras el foco,
           no una transcripción literal del video (el widget real ya trae "@arlo_dev"
           precargado en el feed, ver informe) -->
      <audio id="sfx-key-tick-1" src="assets/sfx-key-tick.mp3"
        data-start="9.32" data-duration="0.4" data-track-index="18" data-volume="0.30"></audio>
      <audio id="sfx-key-tick-2" src="assets/sfx-key-tick.mp3"
        data-start="9.44" data-duration="0.4" data-track-index="19" data-volume="0.28"></audio>
      <audio id="sfx-key-tick-3" src="assets/sfx-key-tick.mp3"
        data-start="9.56" data-duration="0.4" data-track-index="20" data-volume="0.30"></audio>

      <!-- widget · sub-swell grave bajo el push de cámara (9.6-11.6s) — recorte del propio
           whoosh-cinematic bundled (su build real 1.0-3.0s, ver informe), le da peso al
           zoom sin ser un impacto nuevo -->
      <audio id="sfx-push-swell" src="assets/sfx-push-swell.mp3"
        data-start="9.6" data-duration="2.0" data-track-index="21" data-volume="0.55"></audio>

      <!-- scroll · whoosh sutil en cada reveal de sección — timings verificados por frame
           contra beat3-scroll.webm (no los ~17.5/19.5/21.5 de la primera estimación: para
           17.5s /01 y /02 YA estaban ambos en cuadro, ver informe), no una textura de UI
           adicional (el único "texture" bundled es un glitch digital, fuera de registro) -->
      <audio id="sfx-reveal-01" src="assets/sfx-whoosh-short.mp3"
        data-start="16.7" data-duration="0.575" data-track-index="22" data-volume="0.30"></audio>
      <audio id="sfx-reveal-02" src="assets/sfx-whoosh-short.mp3"
        data-start="17.3" data-duration="0.575" data-track-index="23" data-volume="0.32"></audio>
      <audio id="sfx-reveal-03" src="assets/sfx-whoosh-short.mp3"
        data-start="18.6" data-duration="0.575" data-track-index="24" data-volume="0.30"></audio>
    </div>

    <script>
      // Read the composition variable synchronously, before the timeline is
      // built, and reflect it as a class on <html>. CSS defaults to the
      // "bookends on" look (matching the declared variable default of
      // `true`), so this only ever needs to REMOVE the bookend layers.
      var __vars = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : { bookends: true };
      var bookends = __vars.bookends !== false;
      document.documentElement.classList.toggle("no-bookends", !bookends);

      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      /* ---------- BEAT 1 : hook (0-4s) — word-by-word stagger ---------- */
      if (bookends) {
        tl.fromTo("#beat1-bg", { scale: 1.06 }, { scale: 1.0, duration: 4, ease: "sine.out" }, 0);
      }
      tl.fromTo(
        "#beat1-text .b1-word",
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.45, ease: "power3.out", stagger: 0.07 },
        0.1,
      );

      /* ---------- BEAT 2 : twist (4-7s) — hard cut + settle ---------- */
      // The clip's own visibility toggle (class="clip") is the hard cut —
      // no opacity fade here. Only a fast scale-settle rides on top.
      tl.fromTo("#beat2-text", { scale: 1.05 }, { scale: 1.0, duration: 0.22, ease: "power2.out" }, 4);

      /* ---------- BEAT 3 : product (7-24s) — widget en vivo + push de cámara
         + scroll cinematográfico. El video no se puede envolver (contrato
         HyperFrames), así que la "cámara" es un mismo tween aplicado como
         HERMANOS a #beat3-widget-video + #beat3-frame + #beat3-cursor.

         Matemática (coordinate-target-zoom adaptada, sin wrapper): fijamos
         transform-origin de cada hermano en el mismo punto ABSOLUTO — el
         centro real del panel del widget (beat3-coords.json) — y sumamos un
         translate CONSTANTE T = centroCanvas − centroPanel. Con origin en el
         punto que debe quedar fijo bajo el scale, T no depende de la escala
         (ver hyperframes-animation/rules/coordinate-target-zoom.md), así que
         solo animamos `scale`; x/y arrancan en 0 y llegan a T tweeneados
         junto con la escala (mismos duration/ease) para que el resultado sea
         un pan+zoom continuo hacia el panel, no un salto. */
      var B3_PANEL_CX = 1092.921875 + 419.0625 / 2; // 1302.453125
      var B3_PANEL_CY = 128 + 376.5 / 2; //             316.25
      var B3_PUSH_SCALE = 1.7; // headroom: panel a 1.7x ocupa ~37%x59% del canvas (cap 88%)
      var B3_PUSH_TX = 960 - B3_PANEL_CX; // -342.453125
      var B3_PUSH_TY = 540 - B3_PANEL_CY; //  223.75
      var B3_CURSOR_LEFT = 1294,
        B3_CURSOR_TOP = 448; // reposo del cursor sobre el input (coords.json)

      // Fase 1 — establish: la ventana se asienta (7.0-8.2s). Origen 50% 50%
      // (default) = centro de canvas para el video/marco full-bleed.
      tl.fromTo(
        ["#beat3-widget-video", "#beat3-frame"],
        { scale: 0.94 },
        { scale: 1.0, duration: 1.2, ease: "power3.out" },
        7.0,
      );

      // Fase 2 — el cursor de marca entra y se desliza hacia el input (8.6-9.2s).
      tl.fromTo(
        "#beat3-cursor",
        { x: -1034, y: 312, opacity: 0 },
        { x: 0, y: 0, opacity: 1, duration: 0.6, ease: "power3.out" },
        8.6,
      );

      // Fase 3 — click + ripple sobre el input (9.25s), resuelve a 9.6s justo
      // antes del push (cursor-click-ripple: move → settle → click → ripple).
      tl.to(
        "#beat3-cursor",
        { scale: 0.85, duration: 0.08, ease: "power2.in", yoyo: true, repeat: 1 },
        9.25,
      );
      tl.set("#beat3-ripple", { opacity: 1 }, 9.25);
      tl.fromTo(
        "#beat3-ripple",
        { scale: 0 },
        { scale: 3.4, opacity: 0, duration: 0.35, ease: "power2.out", immediateRender: false },
        9.25,
      );

      // A las 9.6s escala=1 y x/y=0 en los 3 hermanos → recentramos el origen
      // en el centro REAL del panel sin ningún salto visual (cambiar
      // transform-origin a scale=1/translate=0 es la identidad, sea cual sea
      // el origen), justo antes de que arranque el push.
      tl.set(
        ["#beat3-widget-video", "#beat3-frame"],
        { transformOrigin: B3_PANEL_CX + "px " + B3_PANEL_CY + "px" },
        9.6,
      );
      tl.set(
        "#beat3-cursor",
        { transformOrigin: (B3_PANEL_CX - B3_CURSOR_LEFT) + "px " + (B3_PANEL_CY - B3_CURSOR_TOP) + "px" },
        9.6,
      );

      // Fase 4 — push de cámara al panel del widget (9.6-11.0s). Un solo
      // tween con target-array garantiza progreso IDÉNTICO en los 3 hermanos
      // (nunca desincronizados entre sí).
      tl.to(
        ["#beat3-widget-video", "#beat3-frame", "#beat3-cursor"],
        { scale: B3_PUSH_SCALE, x: B3_PUSH_TX, y: B3_PUSH_TY, duration: 1.4, ease: "power3.inOut" },
        9.6,
      );

      // Foco en el widget (FIX gate de arte): scrim radial que hunde los
      // fragmentos huérfanos del hero (titular cortado, botón asomando en el
      // borde) durante el push/hold. Fade-in arranca con el push mismo
      // (9.6→10.4). IMPORTANTE: el pull-back de #beat3-frame (15.18→15.58,
      // más abajo) sólo encoge el BEZEL — el video del widget se queda al
      // scale del push (1.7x) hasta el corte duro de 15.58s, así que al
      // encogerse el bezel se destapa progresivamente más del recorte que
      // tapaba (el bug real detrás de "Check a balance"/"Launch a coin"
      // asomando). Por eso el foco se SOSTIENE a opacidad plena hasta el
      // corte mismo — sin fade-out propio — y desaparece con el resto de la
      // escena vía el propio corte duro del clip (data-duration termina
      // justo en 15.58), consistente con que el proyecto ya trata ese corte
      // como hard cut sin crossfade.
      tl.fromTo("#beat3-focus-vignette-inner", { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "sine.out" }, 9.6);

      // Fase 5 — hold (11.0-15.08s): sin más cámara — el feed real llenándose
      // de @arlo_dev y el contador subiendo hacen el trabajo (sin micro-drift:
      // con 2 hermanos ya en juego, un drift añadido no vale el riesgo de
      // desincronía frente al contenido real, que ya aporta el movimiento).
      // NOTA duración: beat3-widget.webm mide 14.08s; con data-media-start
      // 5.5s quedan 8.58s reproducibles, así que el hero cierra a los 15.58s
      // (7.0+8.58), no a los 16.6s del plan original — el resto de las fases
      // de este beat se retimearon en consecuencia (ver informe).

      // El cursor se apaga antes del corte (15.08-15.48s).
      tl.to("#beat3-cursor", { opacity: 0, duration: 0.4, ease: "power2.in" }, 15.08);

      // Pull-back del marco a neutro ANTES del corte (15.18-15.58s) — termina
      // justo cuando entra beat3-scroll.webm, así el corte nunca muestra el
      // marco todavía "empujado" contra un fondo que ya cambió.
      tl.to("#beat3-frame", { scale: 1.0, x: 0, y: 0, duration: 0.4, ease: "power2.out" }, 15.18);
      tl.set("#beat3-frame", { transformOrigin: "50% 50%" }, 15.58);

      // Fase 6 — scroll cinematográfico (15.98-23.6s): push de cámara continuo
      // y suave (multi-phase-camera, patrón "steady push"), centrado. Arranca
      // 0.4s después del corte (15.58) para un respiro neutro post-corte, y
      // usa el resto del beat (hasta 23.6, dejando 23.6-24.0 de settle).
      tl.fromTo(
        ["#beat3-scroll-video", "#beat3-frame"],
        { scale: 1.0 },
        { scale: 1.05, duration: 7.62, ease: "power2.inOut" },
        15.98,
      );
      // 23.6-24.0 queda en settle (sin más tweens) antes del corte a beat 4.

      tl.fromTo("#beat3-label", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power3.out" }, 7.15);

      /* ---------- BEAT 4 : promise (24-29s) — kinetic stack, one line per beat ---------- */
      // Distinct entrance per line (kinetic-beat-slam pattern): slam / side-snap / rise+rotate.
      tl.fromTo(
        "#b4-l1",
        { scale: 1.4, filter: "blur(14px)", opacity: 0 },
        { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.5, ease: "power4.out" },
        24.0,
      );
      tl.fromTo("#b4-l2", { x: -260, opacity: 0 }, { x: 0, opacity: 1, duration: 0.45, ease: "expo.out" }, 25.7);
      tl.fromTo(
        "#b4-l3",
        { y: 90, rotation: 5, opacity: 0 },
        { y: 0, rotation: 0, opacity: 1, duration: 0.55, ease: "circ.out" },
        27.3,
      );

      /* ---------- BEAT 5 : remate (29-33s) — logo sting, clean fade out ---------- */
      if (bookends) {
        tl.fromTo("#beat5-bg", { scale: 1.03 }, { scale: 1.0, duration: 4, ease: "sine.out" }, 29);
      }
      tl.fromTo("#bowmark", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" }, 29.0);
      tl.fromTo("#beat5-word", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, 29.3);
      tl.fromTo("#beat5-tag", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power3.out" }, 29.6);
      tl.fromTo("#beat5-url", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 29.85);
      // Clean fade to paper-black over the last 0.6s — a dedicated veil (not just
      // content opacity) so the ending reads as a true fade-out in both bookend
      // variants, whether the backdrop is the close photo or flat paper.
      tl.fromTo("#beat5-veil", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.in" }, 32.4);

      // Capa de sonido: los SFX (incluido el bed de ambiente y el sound design nuevo)
      // se disparan por su data-start/data-duration en el motor de HyperFrames
      // (playback determinista); su nivel es estático (data-volume) y cada archivo
      // ya trae su propia envolvente/decay (el bed trae su propio fade-in/fade-out
      // bakeado), así que no hacen falta tweens de volumen en el timeline.

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
