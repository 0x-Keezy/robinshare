<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>RobinShare — claim flow (cinematic)</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ---------- fonts (local, deterministic — same set as index.html) ---------- */
      @font-face {
        font-family: "Archivo Black";
        src: url("fonts/archivo-black-400-latin.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }
      @font-face {
        font-family: "IBM Plex Mono";
        src: url("fonts/ibm-plex-mono-400-latin.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }
      @font-face {
        font-family: "IBM Plex Mono";
        src: url("fonts/ibm-plex-mono-500-latin.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
        font-display: block;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --paper: #0d120e;
        --ink: #f2f3ee;
        --lime: #ccff00;
        --signal: #00c805;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        background: var(--paper);
        overflow: hidden;
      }
      body {
        font-family: "IBM Plex Mono", monospace;
        color: var(--ink);
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--paper);
      }

      .clip {
        position: absolute;
      }

      /* shared background — not a clip, always visible (full-screen-motion pattern) */
      #bg {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: var(--paper);
      }

      /* ---------- scene 1 : arrow open (0-2.0s) ---------- */
      #arrow-video {
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
        transform-origin: 50% 50%;
        will-change: transform;
        /* slightly moodier grade — same static-filter technique as beat5-bg in index.html */
        filter: contrast(1.07) saturate(1.02) brightness(0.94);
      }
      /* localized cyan→lime push on the blade-tip glow: TWO stacked patches now
         (v3 — was one, still had a faint cyan fringe at the outer edge per v1
         concern). #arrow-grade ("color" blend) recolors the hot core hue+sat
         while keeping backdrop luminance; #arrow-grade-2 ("hue" blend, wider/
         softer) reaches further into the outer glow ring to catch the fringe
         without restating saturation there (avoids an oversaturated ring).
         Static boxes, no per-frame randomness — tuned against the captured
         frame, not estimated. */
      #arrow-grade {
        left: 170px;
        top: 565px;
        width: 580px;
        height: 390px;
        pointer-events: none;
        mix-blend-mode: color;
        background: radial-gradient(ellipse 60% 60% at 42% 53%, rgba(204, 255, 0, 0.97) 0%, rgba(204, 255, 0, 0.6) 48%, rgba(204, 255, 0, 0) 78%);
      }
      #arrow-grade-2 {
        left: 120px;
        top: 525px;
        width: 720px;
        height: 480px;
        pointer-events: none;
        mix-blend-mode: hue;
        background: radial-gradient(ellipse 65% 65% at 42% 53%, rgba(204, 255, 0, 0.92) 0%, rgba(204, 255, 0, 0.42) 55%, rgba(204, 255, 0, 0) 82%);
      }

      /* ---------- transition flash (arrow → claim) ---------- */
      #flash,
      #flash2 {
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: var(--lime);
        pointer-events: none;
        opacity: 0;
      }

      /* ---------- scene 2 : claim flow (2.0s - end) ---------- */
      .scene-fill {
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: var(--paper);
      }
      #claim-video {
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
        will-change: transform;
        filter: contrast(1.05) saturate(1.04) brightness(0.98);
      }
      #caption-label {
        left: 96px;
        bottom: 84px;
        max-width: 1200px;
        font-size: 24px;
        letter-spacing: 0.14em;
        line-height: 1.5;
        text-transform: uppercase;
        color: var(--ink);
        opacity: 0.88;
      }
      #vignette {
        inset: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
      }
      #vignette-inner {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: radial-gradient(
          ellipse 900px 620px at 960px 500px,
          rgba(3, 6, 4, 0) 0%,
          rgba(3, 6, 4, 0) 46%,
          rgba(3, 6, 4, 0.88) 86%,
          rgba(3, 6, 4, 0.88) 100%
        );
        opacity: 0;
        will-change: opacity;
      }
      /* cursor of brand — same triangle-glow vocabulary as #beat3-cursor in
         index.html, anchored at the button's real center (claim-coords.json) */
      #cursor-cam {
        left: 960px;
        top: 508.8px;
        width: 0;
        height: 0;
        overflow: visible;
        will-change: transform;
        pointer-events: none;
      }
      #cursor-icon {
        position: absolute;
        left: -15px;
        top: -15px;
        width: 30px;
        height: 30px;
        opacity: 0;
        filter: drop-shadow(0 0 3px rgba(204, 255, 0, 0.85)) drop-shadow(0 0 11px rgba(204, 255, 0, 0.5));
      }
      /* hover-anticipation halo — sustained soft glow while the cursor holds over a
         button (distinct from the sharp click-ripple burst below); lives inside
         #cursor-cam so it inherits the same camera transform for free */
      #hover-glow {
        position: absolute;
        left: -34px;
        top: -34px;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(204, 255, 0, 0.55) 0%, rgba(204, 255, 0, 0.2) 45%, rgba(204, 255, 0, 0) 72%);
        opacity: 0;
        filter: blur(1px);
      }
      /* button bloom (v3 — finishing pass) — a soft, wide lime bleed sitting
         BEHIND the hover-glow/ripple, always faintly present while the CTA is
         live, screen-blended so it lifts light rather than washing the frame.
         Finite fromTo+yoyo+repeat below (never repeat:-1, see determinism
         rules), pinned + faded out explicitly once the button retires. */
      #button-bloom {
        position: absolute;
        left: -320px;
        top: -50px;
        width: 640px;
        height: 100px;
        border-radius: 50px;
        background: radial-gradient(ellipse, rgba(204, 255, 0, 0.4) 0%, rgba(204, 255, 0, 0.14) 50%, rgba(204, 255, 0, 0) 76%);
        opacity: 0;
        filter: blur(11px);
        mix-blend-mode: screen;
      }
      #ripple-cam {
        left: 960px;
        top: 508.8px;
        width: 0;
        height: 0;
        overflow: visible;
        will-change: transform;
        pointer-events: none;
      }
      .ripple {
        position: absolute;
        left: 0;
        top: 0;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 2px solid var(--lime);
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
        /* bloom (v3) — soft double glow so the ring reads as lit, not just outlined */
        filter: drop-shadow(0 0 7px rgba(204, 255, 0, 0.9)) drop-shadow(0 0 16px rgba(204, 255, 0, 0.4));
      }
      /* payoff comet — the ETH visibly leaving the balance toward the wallet;
         anchored near the balance number (claim-coords.json boxBalance), shares the
         camera group so it scales/pans with the zoom (coordinate-target-zoom rule) */
      #comet-cam {
        left: 960px;
        top: 365px;
        width: 0;
        height: 0;
        overflow: visible;
        will-change: transform;
        pointer-events: none;
      }
      .comet-dot {
        position: absolute;
        left: -8px;
        top: -8px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(204, 255, 0, 0.95) 0%, rgba(204, 255, 0, 0.4) 55%, rgba(204, 255, 0, 0) 80%);
        opacity: 0;
        filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.7));
      }
      /* balance bloom (v3) — bleed behind the ETH number, tied to the payoff
         beat (builds right as the drain/impact lands, settles through the
         hold) rather than an ambient always-on pulse — the glow reads as a
         REACTION to the payoff, not decoration. */
      #balance-bloom {
        position: absolute;
        left: -320px;
        top: -130px;
        width: 640px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(204, 255, 0, 0.3) 0%, rgba(204, 255, 0, 0.1) 50%, rgba(204, 255, 0, 0) 78%);
        opacity: 0;
        filter: blur(18px);
        mix-blend-mode: screen;
      }
      /* soft backing pulse behind "Done." — the real check + text pop is baked into
         the captured video (ClaimClient demo mode); this just adds a touch of glow */
      #done-glow {
        left: 960px;
        top: 596px;
        width: 0;
        height: 0;
        overflow: visible;
        pointer-events: none;
      }
      #done-glow-inner {
        position: absolute;
        left: -260px;
        top: -90px;
        width: 520px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(204, 255, 0, 0.28) 0%, rgba(204, 255, 0, 0) 70%);
        opacity: 0;
      }

      /* ---------- film treatment — always on top, whole composition ---------- */
      /* color-grade tint (v3) — a full-frame soft-light wash, dark paper-green
         in the shadows easing to a faint lime hint in the highlights, so the
         whole piece reads as ONE graded shot rather than two clips with
         separate per-element filters. Untimed (like #grain below) — a
         constant wash needs no data-start/duration, same pattern already
         proven by #grain. */
      #grade-tint {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        mix-blend-mode: soft-light;
        opacity: 0.6;
        background: linear-gradient(155deg, rgba(6, 10, 7, 0.6) 0%, rgba(6, 10, 7, 0.14) 45%, rgba(204, 255, 0, 0.07) 100%);
      }
      #grain {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        opacity: 0.068;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch' seed='7'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        background-repeat: repeat;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="claimflow" data-start="0" data-duration="12.9" data-width="1920" data-height="1080">
      <div id="bg"></div>

      <!-- ============ SCENE 1 — the arrow (0-2.0s) ============ -->
      <video
        id="arrow-video"
        class="clip"
        src="assets/arrow-cine.mp4"
        data-start="0"
        data-duration="2.0"
        data-media-start="0.15"
        data-track-index="1"
        muted
        playsinline
      ></video>
      <div id="arrow-grade" class="clip" data-start="0" data-duration="2.0" data-track-index="2"></div>
      <div id="arrow-grade-2" class="clip" data-start="0" data-duration="2.0" data-track-index="20"></div>

      <!-- transition — the arrow "delivers" into the claim flow -->
      <div id="flash" class="clip" data-start="1.8" data-duration="0.35" data-track-index="3"></div>

      <!-- ============ SCENE 2 — the real claim flow (2.0s - 12.9s) ============
           v3 re-grounding: the ClaimClient demo-state fix required a fresh
           Playwright capture. TWO grounding attempts preceded this one and
           were both discarded: (1) nominal sums of the capture script's own
           waitForTimeout values drift badly run-to-run (the identity-proof
           beat alone can land 0.5-1.3s later than scripted); (2) wall-clock
           Date.now() instrumentation (real elapsed ms since recordVideo
           start) looked authoritative but was STILL off by 0.1-0.3s against
           the actual video pixels — Chrome's capture/encode pipeline lags
           real time by a variable amount under this concurrent chrome +
           ffmpeg + dev-server load. The only ground truth that matched the
           actual file was automated frame-level scene-change detection:
             ffmpeg -i claim-raw.webm -vf "crop=700:200:600:470,
               select='gt(scene,0.015)',showinfo" -f null -
           cropped to just the button/status-text region, which prints the
           exact timestamps where that region visibly changes. Confirmed
           against manual ffmpeg frame extraction at two independent points
           (5.8s and 9.56s) before trusting it for the rest. All times below
           are t_comp = t_raw + 0.72 against those detected raw timestamps
           (media-start trims 1.28s off the 12.24s capture; scene2 starts at
           2.0 -> 2.0 - 1.28 = 0.72 offset). -->
      <div id="claim-scene-bg" class="clip scene-fill" data-start="2.0" data-duration="10.9" data-track-index="1"></div>
      <video
        id="claim-video"
        class="clip"
        src="assets/claim-raw.webm"
        data-start="2.0"
        data-duration="10.9"
        data-media-start="1.28"
        data-track-index="2"
        muted
        playsinline
      ></video>
      <div id="caption-label" class="clip" data-start="2.6" data-duration="3.3" data-track-index="3">
        the builder claims — proving it's them
      </div>
      <div id="vignette" class="clip" data-start="2.0" data-duration="10.9" data-track-index="4">
        <div id="vignette-inner"></div>
      </div>
      <div id="ripple-cam" class="clip" data-start="2.0" data-duration="10.9" data-track-index="5">
        <div class="ripple ripple-1"></div>
        <div class="ripple ripple-2"></div>
      </div>
      <div id="cursor-cam" class="clip" data-start="2.0" data-duration="10.9" data-track-index="6">
        <div id="button-bloom"></div>
        <div id="hover-glow"></div>
        <svg id="cursor-icon" width="30" height="30" viewBox="0 0 24 24">
          <path d="M5 3L19 12L12 13L9 20L5 3Z" fill="var(--lime)" stroke="var(--paper)" stroke-width="1.5" />
        </svg>
      </div>
      <div id="comet-cam" class="clip" data-start="2.0" data-duration="10.9" data-track-index="8">
        <div id="balance-bloom"></div>
        <div class="comet-dot"></div>
      </div>
      <div id="flash2" class="clip" data-start="9.4" data-duration="0.6" data-track-index="7"></div>
      <div id="done-glow" class="clip" data-start="10.1" data-duration="1.6" data-track-index="9">
        <div id="done-glow-inner"></div>
      </div>

      <!-- ---------- film treatment, always on top ---------- -->
      <div id="grade-tint"></div>
      <div id="grain"></div>

      <!-- ============ SOUND DESIGN (v3 — was silent) ============
           One continuous ambient bed under the whole 12.9s (never drops to
           full silence except the closing fade in the last 0.5s), plus
           designed SFX accents synced to the frame-detected beat times
           above: a tick on each hover, a click/pop on each click, a chime on
           "Verified", a bigger impact right when the balance drains (not on
           the click itself — the click and the drain land ~0.5s apart, the
           component's own real gap), a whoosh as the ETH flies out, and a
           confirmation tone on "Done." All bundled assets (media-use, no
           credentials needed) — same library index.html already draws from.
           <audio> are direct children of #root per the HyperFrames media
           contract, tracks 30+ so they never collide with the visual tracks
           above. -->
      <audio id="bed-ambient" src="assets/bed-ambient.mp3" data-start="0" data-duration="12.9" data-track-index="30" data-volume="0.45"></audio>

      <!-- arrow → claim transition — pairs the hard flash cut with a whoosh so the cut reads intentional -->
      <audio id="sfx-arrow-transition" src="assets/sfx-whoosh-short.mp3" data-start="1.5" data-duration="0.575" data-track-index="31" data-volume="0.42"></audio>

      <!-- hover ticks (soft, x3) -->
      <audio id="sfx-tick-1" src="assets/sfx-key-tick.mp3" data-start="4.0" data-duration="0.4" data-track-index="32" data-volume="0.3"></audio>
      <audio id="sfx-tick-2" src="assets/sfx-key-tick.mp3" data-start="5.07" data-duration="0.4" data-track-index="34" data-volume="0.3"></audio>
      <audio id="sfx-tick-3" src="assets/sfx-key-tick.mp3" data-start="8.51" data-duration="0.4" data-track-index="37" data-volume="0.3"></audio>

      <!-- click/pop (x3, matches the 3 ripples) -->
      <audio id="sfx-click-1" src="assets/sfx-whoosh-short.mp3" data-start="4.52" data-duration="0.575" data-track-index="33" data-volume="0.42"></audio>
      <audio id="sfx-click-2" src="assets/sfx-whoosh-short.mp3" data-start="5.52" data-duration="0.575" data-track-index="35" data-volume="0.42"></audio>
      <audio id="sfx-click-3" src="assets/sfx-whoosh-short.mp3" data-start="8.96" data-duration="0.575" data-track-index="38" data-volume="0.42"></audio>

      <!-- "Verified via GitHub" chime — the identity proof made audible -->
      <audio id="sfx-verified-chime" src="assets/sfx-ping.mp3" data-start="6.52" data-duration="1.32" data-track-index="36" data-volume="0.5"></audio>

      <!-- the claim payoff: impact right as the balance actually starts draining (measured ~0.5s after the click, not on the click itself) -->
      <audio id="sfx-impact-claim" src="assets/sfx-impact-lockup.mp3" data-start="9.46" data-duration="2.592" data-track-index="39" data-volume="0.48"></audio>
      <!-- the ETH visibly arriving/leaving, just after the impact -->
      <audio id="sfx-eth-whoosh" src="assets/sfx-whoosh.mp3" data-start="9.61" data-duration="0.575" data-track-index="40" data-volume="0.4"></audio>
      <!-- "Done." confirmation tone -->
      <audio id="sfx-done-confirm" src="assets/sfx-ping.mp3" data-start="10.28" data-duration="1.32" data-track-index="41" data-volume="0.58"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      /* ================= SCENE 1 — arrow open (0-2.0s) ================= */
      tl.fromTo("#arrow-video", { scale: 1.0 }, { scale: 1.07, duration: 2.0, ease: "sine.out" }, 0);
      tl.fromTo("#arrow-grade", { opacity: 0 }, { opacity: 0.95, duration: 1.5, ease: "sine.out" }, 0.35);
      tl.fromTo("#arrow-grade-2", { opacity: 0 }, { opacity: 0.55, duration: 1.3, ease: "sine.out" }, 0.45);

      // transition flash — the arrow "releases" into the claim flow
      tl.set("#flash", { opacity: 0 }, 1.8);
      tl.to("#flash", { opacity: 0.94, duration: 0.12, ease: "power2.out" }, 1.8);
      tl.to("#flash", { opacity: 0, duration: 0.23, ease: "power2.in" }, 1.92);

      /* ================= SCENE 2 — claim flow (2.0s - 12.9s) =================
         Camera: coordinate-target-zoom (hyperframes-animation/rules), applied
         directly to the media/cursor/comet SIBLINGS (video can't be wrapped —
         see hyperframes-core "Do not nest video inside a wrapper"). transform-
         origin is fixed at the panel's real center for the WHOLE scene (measured,
         claim-coords.json) — with origin = the point that must stay put, a
         constant translate (canvasCenter - origin) recenters it regardless of
         scale, so every phase below shares one origin with no jump between them.

         Reactive camera: a small forward LEAN while the cursor holds over a
         button (hover), a quick recoil/flinch exactly on click (settle), a
         sustained travel push between beats, and a pull-back once the payoff
         lands. All times below are t_comp = t_raw + 0.72 against the v3
         frame-detected capture (see the HTML comment above #claim-scene-bg
         for the grounding method — ffmpeg scene-change detection cropped to
         the button/status region, not hand math or wall-clock timers). */
      var PANEL_CX = 960, PANEL_CY = 444.4; // panel center (claim-coords.json boxConnect, unchanged from v2 — same layout)
      var CAM_TX = 960 - PANEL_CX; // 0
      var CAM_TY = 540 - PANEL_CY; // 95.6
      var CAM_ORIGIN = PANEL_CX + "px " + PANEL_CY + "px";
      var CAM = ["#claim-video", "#cursor-cam", "#ripple-cam", "#comet-cam"];

      // cursor-cam / ripple-cam / comet-cam are each anchored at their OWN point
      // (button center for cursor/ripple, balance-number area for comet) — NOT
      // the panel center — so each transform-origin is expressed in THAT
      // element's own local box (origin point minus its own left/top), same
      // correction index.html applies to #beat3-cursor.
      var BUTTON_CX = 960, BUTTON_CY = 508.8;
      var CURSOR_ORIGIN = (PANEL_CX - BUTTON_CX) + "px " + (PANEL_CY - BUTTON_CY) + "px"; // "0px -64.4px"
      var COMET_CX = 960, COMET_CY = 365;
      var COMET_ORIGIN = (PANEL_CX - COMET_CX) + "px " + (PANEL_CY - COMET_CY) + "px"; // "0px 79.4px"

      tl.set(["#claim-video"], { transformOrigin: CAM_ORIGIN }, 2.0);
      tl.set(["#cursor-cam", "#ripple-cam"], { transformOrigin: CURSOR_ORIGIN }, 2.0);
      tl.set(["#comet-cam"], { transformOrigin: COMET_ORIGIN }, 2.0);

      // Phase 1 — establish, then push in toward the panel (2.3-3.8)
      tl.fromTo(CAM, { scale: 1.0, x: 0, y: 0 }, { scale: 1.24, x: CAM_TX, y: CAM_TY, duration: 1.5, ease: "power3.out" }, 2.3);

      // Hover lean #1 — Connect wallet (hover@4.0, click@4.52)
      tl.to(CAM, { scale: 1.27, duration: 0.35, ease: "sine.out" }, 4.0);
      tl.to(CAM, { scale: 1.245, duration: 0.08, ease: "power2.in", yoyo: true, repeat: 1 }, 4.52); // click settle/flinch

      // Hover lean #2 — Verify with GitHub (hover@5.07, click@5.52)
      tl.to(CAM, { scale: 1.30, duration: 0.35, ease: "sine.out" }, 5.07);
      tl.to(CAM, { scale: 1.275, duration: 0.08, ease: "power2.in", yoyo: true, repeat: 1 }, 5.52); // click settle/flinch

      // Phase 2 — travel push spanning the identity-proof beat ("Verifying…"
      // clears at comp 6.52 when the chip appears, Claim button visible by
      // comp 7.16 — frame-detected), starting right as the click-flinch
      // above resolves (5.52+0.16=5.68) and arriving just before Claim hover
      tl.to(CAM, { scale: 1.52, duration: 2.83, ease: "power2.inOut" }, 5.68);

      // Hover lean #3 — Claim (hover@8.51, click@8.96 — frame-detected)
      tl.to(CAM, { scale: 1.56, duration: 0.35, ease: "sine.out" }, 8.51);
      tl.to(CAM, { scale: 1.545, duration: 0.15, ease: "power2.in" }, 8.96); // click impact-snap (absorbs, then climax below)

      // Climax push — arrives exactly as the balance finishes draining and
      // "Done." appears (comp 10.28 — frame-detected tDoneVisible)
      tl.to(CAM, { scale: 1.9, duration: 1.17, ease: "power3.inOut" }, 9.11);

      // Pull-back — the camera exhales after the payoff, settling to frame
      // "Done." + the check + "View transaction →" comfortably; comp 11.43 to
      // the end of the composition (12.9) is a true static hold (~1.5s) —
      // the climax as a whole (Done + 0 ETH + link all on screen, camera
      // settled) spans 10.28-12.9, well past the ~1s ask.
      tl.to(CAM, { scale: 1.78, duration: 1.15, ease: "power2.out" }, 10.28);

      // Vignette intensifies alongside the pushes, then squeezes once more for a clean close
      tl.fromTo("#vignette-inner", { opacity: 0.26 }, { opacity: 0.62, duration: 10.5, ease: "sine.inOut" }, 2.0);
      tl.to("#vignette-inner", { opacity: 0.74, duration: 0.4, ease: "power2.in" }, 12.5);

      // Caption — minimal mono label, in and out
      tl.fromTo("#caption-label", { opacity: 0, y: 14 }, { opacity: 0.88, y: 0, duration: 0.6, ease: "power3.out" }, 2.6);
      tl.to("#caption-label", { opacity: 0, duration: 0.5, ease: "power2.in" }, 5.4);

      // Cursor entrance — arrives just before the first hover
      tl.fromTo("#cursor-icon", { opacity: 0 }, { opacity: 1, duration: 0.3, ease: "power2.out" }, 3.6);

      // Button bloom (v3) — soft lime bleed behind the CTA, present the whole
      // time a button exists to click. Finite yoyo (repeat:11, never -1, see
      // determinism rules): 12 segments * 0.5s = 6.0s, started at 2.3 so it
      // naturally ends at 8.3; pinned there, then explicitly faded out right
      // as the Claim click retires the button (guards a non-linear seek
      // landing after 8.3s from finding a stale mid-cycle value).
      tl.fromTo("#button-bloom", { opacity: 0.1 }, { opacity: 0.24, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 11 }, 2.3);
      tl.set("#button-bloom", { opacity: 0.1 }, 8.3);
      tl.to("#button-bloom", { opacity: 0, duration: 0.4, ease: "power2.in" }, 8.96);
      tl.set("#button-bloom", { opacity: 0 }, 9.36); // hard kill (gsap_exit_missing_hard_kill)

      // Hover-anticipation halo — sustained soft glow while the cursor holds
      // over each button, distinct from the sharp click-ripple burst; sells
      // "someone is about to click" before they do (micro-interaction rule).
      [
        [4.0, 4.47],
        [5.07, 5.47],
        [8.51, 8.91],
      ].forEach(function (w) {
        tl.fromTo("#hover-glow", { opacity: 0, scale: 0.7 }, { opacity: 0.85, scale: 1, duration: 0.3, ease: "sine.out" }, w[0]);
        tl.to("#hover-glow", { opacity: 0, duration: 0.15, ease: "power2.in" }, w[1]);
      });

      // click-ripple burst, reused 3x (cursor-click-ripple rule) — Connect
      // (4.52), Verify with GitHub (5.52), Claim (8.96). Frame-detected (see header).
      [4.52, 5.52, 8.96].forEach(function (t) {
        tl.set([".ripple-1", ".ripple-2"], { opacity: 1 }, t);
        tl.fromTo(
          [".ripple-1", ".ripple-2"],
          { scale: 0 },
          { scale: 3.2, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.08, immediateRender: false },
          t,
        );
        tl.to("#cursor-icon", { scale: 0.85, duration: 0.08, ease: "power2.in", yoyo: true, repeat: 1 }, t);
      });
      // hard kill after the last ripple's fade so a non-linear seek landing
      // after 9.46s can't find stale opacity (gsap_exit_missing_hard_kill)
      tl.set([".ripple-1", ".ripple-2"], { opacity: 0 }, 9.46);

      // Cursor exits once the Claim ripple resolves, right as the payoff takes over
      tl.to("#cursor-icon", { opacity: 0, duration: 0.35, ease: "power2.in" }, 9.42);

      // sweep impact — the moment the balance actually starts visibly
      // draining (frame-detected: ~0.5s after the Claim click, not on the
      // click itself — see _claimflow-capture.mjs / HTML comment above)
      tl.set("#flash2", { opacity: 0 }, 9.46);
      tl.to("#flash2", { opacity: 0.5, duration: 0.1, ease: "power2.out" }, 9.46);
      tl.to("#flash2", { opacity: 0, duration: 0.35, ease: "power2.in" }, 9.56);

      // payoff comet — the ETH visibly leaving the balance, arcing up and out
      // of frame while the real number sweeps to 0 (comp 9.46-10.36)
      tl.fromTo(".comet-dot", { opacity: 0, x: 0, y: 0, scale: 0.6 }, { opacity: 1, x: 150, y: -95, scale: 1.3, duration: 0.5, ease: "power2.out" }, 9.46);
      tl.to(".comet-dot", { opacity: 0, x: 270, y: -175, scale: 0.35, duration: 0.4, ease: "power2.in" }, 9.96);

      // balance bloom (v3) — builds right as the impact/drain lands, holds
      // through the settle, fades at the very end (reacts to the payoff,
      // not an ambient loop)
      tl.fromTo("#balance-bloom", { opacity: 0 }, { opacity: 0.5, duration: 0.5, ease: "sine.out" }, 9.46);
      tl.to("#balance-bloom", { opacity: 0.22, duration: 1.0, ease: "sine.inOut" }, 9.96);
      tl.to("#balance-bloom", { opacity: 0, duration: 0.8, ease: "power2.in" }, 12.0);

      // soft backing glow behind "Done." — the real check-draw + text pop live
      // in the captured video (ClaimClient demo mode); this just adds weight
      // (frame-detected: "Done." appears at comp 10.28)
      tl.set("#done-glow-inner", { opacity: 0 }, 10.1);
      tl.to("#done-glow-inner", { opacity: 1, duration: 0.35, ease: "power2.out" }, 10.2);
      tl.to("#done-glow-inner", { opacity: 0, duration: 0.7, ease: "power2.in" }, 10.6);

      // ---- audio automation — bed ambient fade-in/duck/fade-out (SFX below are one-shot, static data-volume) ----
      tl.fromTo("#bed-ambient", { volume: 0 }, { volume: 0.45, duration: 0.4, ease: "sine.out" }, 0);
      // duck right before the loudest hit (sfx-impact-claim @9.46) so the two don't stack into clipping
      tl.to("#bed-ambient", { volume: 0.16, duration: 0.15, ease: "power1.in" }, 9.3);
      tl.to("#bed-ambient", { volume: 0.4, duration: 0.5, ease: "sine.out" }, 10.5);
      // closing fade — the only point the bed reaches true silence, right at the end
      tl.to("#bed-ambient", { volume: 0, duration: 0.5, ease: "power2.in" }, 12.4);

      window.__timelines["claimflow"] = tl;
    </script>
  </body>
</html>
